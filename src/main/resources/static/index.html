<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/global.css">
    <title>Game Viewer</title>
</head>
<body>
    <header class="header">
        <div class="header__container">
            <div class="header__container__element">
                <h1>Titulo x</h1>
            </div>
            <div class="header__container__element">
                <a href="">Decorativo</a>
            </div>
        </div>
    </header>
    <main>
        <form>
            <fieldset>
                <legend>Añade un nuevo videohuevos</legend>
                <div>
                    <label for="name">Nombre</label>
                    <input id="name" type="text">
                    <label for="esrb">Categoria</label>
                    <select id="esrb">
                        <option disabled selected value="-1">Selecciona una</option>
                    </select>
                    <label for="image">agrega la url de la imagen</label>
                    <input id="image" type="text">
                    <label for="author">Nombre del autor</label>
                    <input type="text" id="author">
                    <label for="specs">Especificaciones</label>
                    <textarea id="specs"></textarea>
                    <label for="precio">Precio</label>
                    <input id="precio" type="number" min="0" >
                    <div class="form_options">
                        <select id="genres">
                            <option selected disabled value="-1">generos</option>
                        </select>
                        <input type="button" id="add_genre" value="AddGenres">
                    </div>
                    <div class="form_options">
                        <select id="platforms">
                            <option selected disabled value="-1">platafromas</option>
                        </select>
                        <input type="button" id="add_platforms" value="añadir">
                    </div>
                    <input type="button" value="añadir juego" id="addGame">
                </div>
            </fieldset>
        </form>
    </main>
    <footer class="footer">
        <div class="footer__container">

        </div>
    </footer>

        //prueba
        addGame.addEventListener("click", () =>{

                "localhost:8080/api/game/add",
                {
                    headers: {
                        'Content-Type': 'application/json; charset=UTF-8' // *Headers* specify the content type
                    },
                    data
                }
            ).then( response =>{
                    if(!response.ok){
                        // excepcion
                    }
                    return response.json();
                } 
            ).then(json=>{

            })

        });
    </script>
</body>
</html>
