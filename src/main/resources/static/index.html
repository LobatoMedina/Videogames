<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/global.css">
    <title>Game Viewer</title>
</head>
<body>
    <header class="header">
        <div class="header__container">
            <div class="header__container__element">
                <h1>Titulo x</h1>
            </div>
            <div class="header__container__element">
                <a href="#form">Insertar</a>
                <a href="#videogames">Ver</a>
            </div>
        </div>
    </header>
    <main>
        <form class="form" id="#form">
            <p id="info"></p>
            <fieldset>
                <legend>Añade un nuevo videohuevos</legend>
                <div>
                    <label for="nameInput">Nombre</label>
                    <input id="nameInput" type="text">
                    <label for="esrb">Categoria</label>
                    <select id="esrb">
                        <option disabled selected value="-1">Selecciona una</option>
                    </select>
                    <label for="image">imagen</label>
                    <input type="file" name="image" id="image">
                    <label for="author">Nombre del autor</label>
                    <input type="text" id="author">
                    <label for="specs">Especificaciones</label>
                    <textarea id="specs"></textarea>
                    <label for="precio">Precio</label>
                    <input id="precio" type="number" min="0" max="10000">
                    <div class="useAllColumns">
                        <select id="genres">
                            <option selected disabled value="-1">generos</option>
                        </select>
                        <input type="button" id="add_genre" value="AddGenres">
                        <div id="selectedGenres" class="useAllColumns">

                        </div>
                    </div>
                    <div class="useAllColumns">
                        <select id="platforms">
                            <option selected disabled value="-1">platafromas</option>
                        </select>
                        <input type="button" id="add_platforms" value="añadir">
                        <div id="selectedPlatforms" class="useAllColumns">

                        </div>
                    </div>
                    <input type="button" value="añadir juego" id="addGame" class="useAllColumns">
                </div>
            </fieldset>
        </form>
        <table id="videogames">
            <tr>
                <th>Name</th>
                <th>esrb</th>
                <th>image</th>
                <th>author</th>
                <th>specs</th>
                <th>precio</th>
                <th>genres</th>
                <th>platform</th>
                <th>options</th>
            </tr>
        </table>
    </main>
    <footer class="footer">
        <div class="footer__container">

        </div>
    </footer>
    <script src="js/index.js"></script>
</body>
</html>
